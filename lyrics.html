<!-- Lyrics Container -->

<footer>
  <p>&copy; 2026 Xac Anon. All Rights Reserved.</p>

<!-- Firebase + JS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCHWMstWD8QwoT_kz2lBW8ZNXNlXerl-9c",
    authDomain: "xacanonblog.firebaseapp.com",
    projectId: "xacanonblog",
    storageBucket: "xacanonblog.firebasestorage.app",
    messagingSenderId: "319182532803",
    appId: "1:319182532803:web:3a4d33372643dd71d5f276",
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const _auth = getAuth(app);

// ── MAINTENANCE CHECK ──────────────────────────────────────────
const _maintSnap = await getDoc(doc(db, "siteSettings", "maintenance"));
if (_maintSnap.exists() && _maintSnap.data().enabled === true) {
  const _ov = document.getElementById("maintenance-overlay");
  const _msg = _maintSnap.data().message;
  if (_ov) {
    if (_msg) { const _el = document.getElementById("maint-message-text"); if (_el) _el.textContent = _msg; }
    _ov.style.display = "flex";
    document.body.style.overflow = "hidden";
    onAuthStateChanged(_auth, (user) => {
      if (user) { _ov.style.display = "none"; document.body.style.overflow = ""; }
    });
  }
}

const lyricsList = document.getElementById("lyrics-list");

async function loadLyrics() {
  const q = query(collection(db, "lyrics"), orderBy("timestamp", "desc"));
  const snapshot = await getDocs(q);
  snapshot.forEach(doc => {
    const data = doc.data();
    const lyricEl = document.createElement("div");
    lyricEl.className = "lyric-item";
    lyricEl.innerHTML = `
      <h3>${data.title}</h3>
      <a href="lyric.html?id=${doc.id}">View Full Lyrics</a>
    `;
    lyricsList.appendChild(lyricEl);
  });
}

loadLyrics();

// Hamburger toggle
const hamburger = document.querySelector('.hamburger');
const navLinks = document.querySelector('.nav-links');
hamburger.addEventListener('click', () => {
  navLinks.classList.toggle('active');
});
</script>

</body>
