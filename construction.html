            margin: 0;

            background: #000; 
            color: #f0f0f0; 
            height: 100vh; 
            overflow: hidden;
        }

        /* ===== BACKGROUND IMAGE SETUP ===== */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Your link converted to a direct image link */
            background: url('https://i.ibb.co/39thWLHm/Xac-Anon-Shadow.jpg') no-repeat center center;
            background-size: cover;
            filter: grayscale(100%) brightness(30%);
            z-index: -1;
            animation: slowZoom 20s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .content { 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            text-align: center;
            padding: 2rem;
            background: radial-gradient(circle, rgba(15,15,15,0) 0%, rgba(15,15,15,0.8) 100%);
        }

        h1 { 
            font-size: clamp(2rem, 8vw, 4rem); 
            color: #ff4f81; 
            text-transform: uppercase; 
            margin: 0; 
            letter-spacing: 8px;
            text-shadow: 0 0 15px #ff4f81;
            animation: flicker 4s infinite;
        }

        .status-box {
            border-left: 3px solid #ff4f81;
            padding-left: 1.5rem;
            margin-top: 2rem;
            max-width: 500px;
            text-align: left;
        }

        p { color: #ccc; font-size: 1.1rem; line-height: 1.6; margin: 0; }

        .socials { margin-top: 3rem; display: flex; gap: 2rem; }
        .socials a { color: #f0f0f0; font-size: 2rem; transition: 0.3s; opacity: 0.7; }
        .socials a:hover { color: #ff4f81; opacity: 1; transform: scale(1.2); }

        .btn-home {
            margin-top: 3rem;
            text-decoration: none;
            color: #fff;
            border: 1px solid #ff4f81;
            padding: 0.8rem 2rem;
            border-radius: 4px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .btn-home:hover { background: #ff4f81; color: #000; box-shadow: 0 0 20px #ff4f81; }
