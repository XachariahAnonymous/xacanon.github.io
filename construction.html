<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | Xac Anon</title>
    <link rel="icon" href="https://i.ibb.co/jPxV6BvR/Xac-Anon640x640.jpg" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Friz+Quadrata&display=swap" rel="stylesheet" />
    
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            font-family: 'Friz Quadrata', serif; 
            background: #080808; 
            color: #f0f0f0; 
            height: 100vh; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient Glow in background */
        .glow-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: #ff4f81;
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
        }

        .content { 
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            z-index: 1;
        }

        /* THE FLOATING IMAGE */
        .feature-img {
            max-width: 280px;
            height: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 15px rgba(255, 79, 129, 0.4));
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        h1 { 
            font-size: clamp(1.8rem, 6vw, 3rem); 
            color: #ff4f81; 
            text-transform: uppercase; 
            margin: 0; 
            letter-spacing: 6px;
            text-shadow: 0 0 10px rgba(255, 79, 129, 0.3);
        }

        .status-msg {
            color: #888;
            margin-top: 1rem;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .socials { 
            margin-top: 2.5rem; 
            display: flex; 
            gap: 1.5rem; 
            justify-content: center; 
        }
        .socials a { 
            color: #f0f0f0; 
            font-size: 1.8rem; 
            transition: 0.3s; 
            opacity: 0.5; 
        }
        .socials a:hover { 
            color: #ff4f81; 
            opacity: 1; 
            transform: scale(1.1); 
        }

        .btn-return {
            display: inline-block;
            margin-top: 3rem;
            text-decoration: none;
            color: #ff4f81;
            border: 1px solid #ff4f81;
            padding: 0.7rem 1.8rem;
            border-radius: 4px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-return:hover { 
            background: #ff4f81; 
            color: #000; 
            box-shadow: 0 0 20px #ff4f81; 
        }
    </style>
</head>
<body>

<div class="glow-bg"></div>

<div class="content">
    <img src="https://i.ibb.co/S4qv09pw/de2ed9d3-4a8a-479c-9fff-08d155871fa2-removalai-preview.png" 
         alt="Xac Anon Feature" 
         class="feature-img">

    <h1>System Loading</h1>
    <p class="status-msg">Optimizing this sector for the <strong>Olympus</strong> era.</p>

    <div class="socials">
        <a href="https://instagram.com/xacanon/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://youtube.com/@XacAnon" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://x.com/XacAnonMusic" target="_blank"><i class="fab fa-twitter"></i></a>
    </div>

    <a href="index.html" class="btn-return">Back to Main Hub</a>
</div>

</body>
</html>
