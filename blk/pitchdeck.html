<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --text: #ffffff;
            --accent: #8A2BE2;
            --muted: #666666;
            --border: rgba(255, 255, 255, 0.1);
            --success: #00ff66;
            --error: #ff0033;
            --color-directors: #2e0040; 
            --color-investor: #5a007f;   
            --color-artists: #6f2fa1;    
            --color-public: #3f3f4c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Space Grotesk', sans-serif; 
            line-height: 1.8; 
            overflow-x: hidden; 
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 1.5rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 2000;
        }
        .logo { font-weight: 700; letter-spacing: 2px; font-size: 1.4rem; color: #fff; }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { 
            color: var(--text); text-decoration: none; font-family: 'Space Mono', monospace; 
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--accent); }

        /* --- LAYOUT --- */
        .container { max-width: 1200px; margin: 180px auto 100px; padding: 0 5%; }
        section { margin-bottom: 150px; }
        .label { 
            font-family: 'Space Mono', monospace; color: var(--accent); 
            font-size: 0.9rem; text-transform: uppercase; margin-bottom: 1.5rem; 
            display: block; letter-spacing: 5px; 
        }
        
        h1 { font-size: clamp(2.5rem, 10vw, 6rem); margin-bottom: 3rem; letter-spacing: -4px; line-height: 0.9; font-weight: 700; }
        h2 { font-size: 2.5rem; margin-bottom: 2rem; letter-spacing: -1.5px; }
        .accent-text { color: var(--accent); }
        
        p.long-form { font-size: 1.25rem; color: #b0b0b0; font-weight: 300; max-width: 1000px; margin-bottom: 2.5rem; }

        /* --- DATA GRID --- */
        .data-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 2rem; margin: 4rem 0; 
        }
        .data-card { 
            border: 1px solid var(--border); padding: 3rem; 
            background: linear-gradient(180deg, #050505 0%, #000 100%); 
            position: relative; overflow: hidden;
        }
        .data-card::after {
            content: ''; position: absolute; top: 0; right: 0; width: 40px; height: 40px;
            background: linear-gradient(45deg, transparent 50%, var(--accent) 50%); opacity: 0.2;
        }
        .data-value { font-size: 4.5rem; font-weight: 700; color: #fff; line-height: 1; margin-bottom: 1rem; letter-spacing: -3px; }
        .data-label { font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

        /* --- PIE CHART SECTION --- */
        .fiscal-block {
            display: grid; grid-template-columns: 1fr 1.2fr; gap: 6rem; align-items: center;
            padding: 5rem; background: var(--surface); border: 1px solid var(--border);
            margin-top: 4rem;
        }
        .svg-container { width: 350px; height: 350px; position: relative; justify-self: center; }
        .svg-chart { width: 100%; height: 100%; transform: rotate(-90deg); overflow: visible; }
        .slice-circle { fill: none; stroke-width: 32; transition: 0.4s; cursor: pointer; }

        /* Surgical Glitch (Founders & Investors Only) */
        .glitch-target:hover {
            animation: cyber-shake 0.08s infinite;
            stroke: var(--error) !important;
            filter: drop-shadow(0 0 20px var(--error)) brightness(1.4);
            z-index: 100;
        }
        @keyframes cyber-shake {
            0% { transform: translate(3px, -2px) rotate(0.5deg); }
            50% { transform: translate(-3px, 3px) rotate(-0.5deg); }
            100% { transform: translate(0); }
        }

        .legend { font-family: 'Space Mono', monospace; list-style: none; }
        .legend-item { margin-bottom: 2rem; display: flex; align-items: flex-start; }
        .legend-color-box { width: 18px; height: 18px; margin-top: 5px; margin-right: 20px; flex-shrink: 0; }
        .legend-title { font-size: 0.9rem; text-transform: uppercase; color: #fff; letter-spacing: 1px; display: block; }
        .legend-pct { color: var(--accent); font-weight: 700; margin-left: 10px; }
