            --burn: #ff4500; 
            --success: #00ff66;
            --error: #ff0033;
            --color-directors: #2e0040;

            --color-artists: #6f2fa1;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; line-height: 1.8; overflow-x: hidden; }

        nav {
            position: fixed; top: 0; width: 100%; padding: 1.5rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); z-index: 1000;
        }
        .logo { font-weight: 700; letter-spacing: 2px; font-size: 1.2rem; }
        nav a { color: var(--text); text-decoration: none; font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase; }

        .container { max-width: 1200px; margin: 160px auto 100px; padding: 0 5%; }
        
        /* --- SLIDE SECTIONS --- */
        section { margin-bottom: 120px; padding-bottom: 60px; border-bottom: 1px solid var(--border); }
        .label { font-family: 'Space Mono', monospace; color: var(--accent); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 1.5rem; display: block; letter-spacing: 4px; }
        h1 { font-size: clamp(2.5rem, 8vw, 5rem); margin-bottom: 2rem; letter-spacing: -3px; line-height: 1.05; font-weight: 700; }
        .accent-text { color: var(--accent); }
        
        .lead-text { font-size: 1.4rem; color: #ccc; font-weight: 300; max-width: 900px; margin-bottom: 4rem; line-height: 1.6; }

        /* --- STATS GRID --- */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 2rem; 
            margin: 4rem 0; 
        }
        .stat-card { 
            border: 1px solid var(--border); 
            padding: 3rem; 
            background: linear-gradient(180deg, #080808 0%, #000 100%); 
            position: relative;
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 15px; height: 15px;
            border-top: 2px solid var(--accent); border-left: 2px solid var(--accent);
        }
        .stat-value { font-size: 4rem; font-weight: 700; color: #fff; line-height: 1; margin-bottom: 1rem; display: block; letter-spacing: -2px; }
        .stat-label { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

        /* --- PIE CHART SECTION --- */
        .chart-section {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
            padding: 4rem; background: rgba(138, 43, 226, 0.02); border: 1px solid var(--border);
        }
