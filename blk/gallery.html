<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLK | Asset Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --text: #ffffff;
            --sub: #888888;
            --accent: #8A2BE2;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        nav {
            position: fixed; top: 0; width: 100%; padding: 1.5rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000;
        }
        .logo { font-family: 'Space Mono', monospace; font-weight: 700; letter-spacing: 2px; text-decoration: none; color: white; }
        .back-btn { font-family: 'Space Mono', monospace; color: var(--sub); text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .back-btn:hover { color: var(--accent); }

        .gallery-wrapper {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 80px;
        }

        .gallery-container { 
            position: relative; 
            width: 90%; 
            max-width: 1400px;
            aspect-ratio: 16 / 9;
        }

        .gallery-viewport { 
            width: 100%; 
            height: 100%;
            border: 1px solid var(--border); 
            background: #000; 
            position: relative; 
            overflow: hidden;
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.1);
        }

        .gallery-main { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: opacity 0.3s ease; 
            z-index: 1;
        }
        
        .gallery-nav {
            position: absolute; 
            top: 0;
            height: 100%;
            width: 8%;
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: #fff; 
            font-size: 2.5rem; 
            cursor: pointer; 
            z-index: 100;
            transition: all 0.3s ease;
            user-select: none;
            opacity: 0.3;
        }
        .gallery-nav:hover { opacity: 1; color: var(--accent); background: rgba(0,0,0,0.4); }
        .gallery-nav.prev { left: 0; }
        .gallery-nav.next { right: 0; }

        .scanline {
            width: 100%; height: 100px; z-index: 10; position: absolute; top: -100px;
            background: linear-gradient(to bottom, transparent, rgba(138, 43, 226, 0.05), transparent);
            pointer-events: none; animation: scan 4s linear infinite;
        }

        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }

        .gallery-info {
            width: 90%;
            max-width: 1400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
            font-family: 'Space Mono', monospace;
        }

        .asset-label { color: var(--accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 4px; }
        .gallery-counter { font-size: 0.8rem; color: var(--sub); letter-spacing: 2px; }

        @media (max-width: 768px) {
            .gallery-container { aspect-ratio: 4 / 3; }
            .gallery-nav { font-size: 1.5rem; width: 12%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">BLK.</a>
        <a href="index.html" class="back-btn">← Return to Deck</a>
    </nav>

    <div class="gallery-wrapper">
        <div class="gallery-container">
            <div class="gallery-viewport">
                <div class="gallery-nav prev" onclick="moveSlide(-1)">&#10094;</div>
                <div class="gallery-nav next" onclick="moveSlide(1)">&#10095;</div>
                <img id="mainView" src="https://i.ibb.co/tMJFrdYz/2026-04-22-04-37-54.png" class="gallery-main" alt="BLK Asset View">
                <div class="scanline"></div>
            </div>
        </div>
        
        <div class="gallery-info">
            <span class="asset-label">Infrastructure // Beta Renders</span>
            <div id="counter" class="gallery-counter">1 / 29</div>
        </div>
    </div>

    <script>
        const images = [
            "https://i.ibb.co/tMJFrdYz/2026-04-22-04-37-54.png",
            "https://i.ibb.co/WvLrvSLm/2026-04-22-04-38-20.png",
            "https://i.ibb.co/bMm7gdPy/2026-04-22-04-38-37.png",
            "https://i.ibb.co/JWPSvyws/2026-04-22-04-41-01.png",
            "https://i.ibb.co/4nPCXTcT/2026-04-22-04-41-07.png",
            "https://i.ibb.co/zVQ2tVpF/2026-04-22-04-41-24.png",
            "https://i.ibb.co/wFLxtDFC/2026-04-21-10-46-55.png",
            "https://i.ibb.co/0pP5Qb9q/2026-04-21-10-46-43.png",
            "https://i.ibb.co/7xdJXfbM/2026-04-21-10-45-02.png",
            "https://i.ibb.co/2zHHp9x/2026-04-21-10-47-28.png",
            "https://i.ibb.co/KjNNPPL4/2026-04-21-10-44-33.png",
            "https://i.ibb.co/Q7NPngCy/2026-04-21-10-44-22.png",
            "https://i.ibb.co/TBZ0jh45/2026-04-21-10-43-34.png",
            "https://i.ibb.co/W4GZsRhq/2026-04-21-10-43-29.png",
            "https://i.ibb.co/BH2F6S8M/2026-04-21-10-42-15.png",
            "https://i.ibb.co/5x52g5fz/2026-04-21-10-41-45.png",
            "https://i.ibb.co/VYh5h7f1/2026-04-21-10-40-01.png",
            "https://i.ibb.co/wFXPj8pT/2026-04-21-10-39-40.png",
            "https://i.ibb.co/cXQ0JBR3/2026-04-21-10-36-54.png",
            "https://i.ibb.co/fdyX6rSr/2026-04-21-10-44-48.png",
            "https://i.ibb.co/B5JpxYvB/2026-04-21-10-34-12.png",
            "https://i.ibb.co/vvqZQ7Kn/2026-04-21-10-22-48.png",
            "https://i.ibb.co/Hfq7bhdK/2026-04-21-10-22-42.png",
            "https://i.ibb.co/MyWW5kPV/2026-04-21-10-22-39.png",
            "https://i.ibb.co/36NkGp4/2026-04-21-10-21-20.png",
            "https://i.ibb.co/bTL65sd/2026-04-21-10-21-05.png",
            "https://i.ibb.co/93WwBgXC/2026-04-21-10-20-58.png",
            "https://i.ibb.co/Ld8Z9T92/2026-04-21-10-34-37.png",
            "https://i.ibb.co/1fLtbJQf/2026-04-21-10-47-11.png"
        ];

        images.forEach((src) => {
            const img = new Image();
            img.src = src;
        });

        let currentIndex = 0;

        function moveSlide(direction) {
            currentIndex += direction;
            if (currentIndex >= images.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = images.length - 1;
            updateGallery();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") moveSlide(-1);
            if (e.key === "ArrowRight") moveSlide(1);
        });

        function updateGallery() {
            const view = document.getElementById('mainView');
            view.style.opacity = "0";
            setTimeout(() => {
                view.src = images[currentIndex];
                document.getElementById('counter').innerText = `${currentIndex + 1} / ${images.length}`;
                view.style.opacity = "1";
            }, 150);
        }
    </script>
</body>
</html>
