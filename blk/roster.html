<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLK | Ecosystem Roster</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #8A2BE2;
            --muted: #444444;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.6;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
        }

        .container {
            max-width: 1200px;
            margin: 160px auto 100px;
            padding: 0 5%;
        }

        .section-label {
            font-family: 'Space Mono', monospace;
            color: var(--accent);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            display: block;
        }

        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 6rem;
        }

        .placeholder-card {
            border: 1px solid var(--border);
            aspect-ratio: 3/4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.01);
            position: relative;
            overflow: hidden;
        }

        .placeholder-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255, 255, 255, 0.02) 10px,
                rgba(255, 255, 255, 0.02) 20px
            );
        }

        .placeholder-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 1;
        }

        footer {
            margin-top: 100px;
            padding: 5rem 0;
            text-align: center;
            border-top: 1px solid var(--border);
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: var(--muted);
        }

    </style>
</head>
<body>

    <nav>
        <a href="index.html">← RETURN TO INTERFACE</a>
        <a href="#">BLK // ROSTER STRUCTURE</a>
    </nav>

    <div class="container">
        
        <span class="section-label">Artists</span>
        <main class="roster-grid">
            <div class="placeholder-card"><span class="placeholder-text">Placeholder_01</span></div>
            <div class="placeholder-card"><span class="placeholder-text">Placeholder_02</span></div>
            <div class="placeholder-card"><span class="placeholder-text">Placeholder_03</span></div>
        </main>

        <span class="section-label">Creators</span>
        <main class="roster-grid">
            <div class="placeholder-card"><span class="placeholder-text">Placeholder_04</span></div>
            <div class="placeholder-card"><span class="placeholder-text">Placeholder_05</span></div>
            <div class="placeholder-card"><span class="placeholder-text">Placeholder_06</span></div>
        </main>

        <footer>
            2026 BLK WEB3 ECOSYSTEM. ALL RIGHTS RESERVED.
        </footer>
    </div>

</body>
</html>
