<style>
body { background:#0f0f0f; color:#f0f0f0; font-family:'Friz Quadrata', serif; margin:0; padding:0; }
.navbar { position:sticky; top:0; z-index:1000; background:#0f0f0f; border-bottom:1px solid #ff4f81; box-shadow:0 0 10px #ff4f81; }
.navbar-container { display:flex; justify-content:space-between; align-items:center; padding:1rem 2rem; max-width:1200px; margin:0 auto; flex-wrap:wrap; }
.nav-logo img { height:50px; animation:pulseGlitch 2s infinite ease-in-out; }
@keyframes pulseGlitch {0%,100%{filter:none;}50%{filter:drop-shadow(0 0 6px #ff4f81) scale(1.05);} }
.nav-right { display:flex; align-items:center; gap:1rem; position:relative; }
.home-button { color:#f0f0f0; text-decoration:none; font-size:1.1rem; padding:0.4rem 0.8rem; border:1px solid #ff4f81; border-radius:6px; position:relative; }
.home-button::before, .home-button::after { content:attr(data-text); position:absolute; left:0; width:100%; color:#ff4f81; overflow:hidden; clip:rect(0,0,0,0); }
.home-button:hover::before{ animation:glitchTop 0.6s infinite linear alternate-reverse; }
.home-button:hover::after{ animation:glitchBottom 0.6s infinite linear alternate-reverse; }
.hamburger { font-size:1.8rem; cursor:pointer; color:#f0f0f0; }
.nav-links { list-style:none; flex-direction:column; position:absolute; top:120%; right:0; background:#0f0f0f; border:1px solid #ff4f81; border-radius:8px; padding:0.5rem 1rem; display:none; }
.nav-links li { margin:0.5rem 0; }
.nav-links li a { color:#f0f0f0; text-decoration:none; font-size:1.1rem; position:relative; }
.nav-links li a::before, .nav-links li a::after { content:attr(data-text); position:absolute; left:0; width:100%; color:#ff4f81; overflow:hidden; clip:rect(0,0,0,0); }
.nav-links li a:hover::before{ animation:glitchTop 0.6s infinite linear alternate-reverse; }
.nav-links li a:hover::after{ animation:glitchBottom 0.6s infinite linear alternate-reverse; }
.nav-links.active { display:flex; flex-direction:column; }

@keyframes glitchTop {0%{clip:rect(0,9999px,0,0);}50%{clip:rect(0,9999px,5px,0); transform:translate(-2px,-2px);}100%{clip:rect(0,9999px,0,0);} }
@keyframes glitchBottom {0%{clip:rect(0,9999px,0,0);}50%{clip:rect(5px,9999px,10px,0); transform:translate(2px,2px);}100%{clip:rect(0,9999px,0,0);} }

.post-container { max-width:900px; margin:3rem auto; padding:2rem; background:#2E2D2B; border:1px solid #ff4f81; border-radius:10px; box-shadow:0 0 15px #ff4f81; line-height:1.8; }
.post-container h1 { color:#ff4f81; margin-bottom:1rem; }
.post-container p { margin-bottom:1rem; }
.post-container .meta { font-size:0.9rem; color:#ccc; margin-bottom:1.5rem; }
footer { padding:1rem; text-align:center; background:#111; border-top:1px solid #ff4f81; }
@media(max-width:576px){ .post-container{margin:2rem 1rem; padding:1rem;} .navbar-container{padding:0.5rem 1rem;} .nav-logo img{height:30px;} }
</style>

  <!-- Post content will be injected here -->

<footer>&copy; 2026 Xac Anon. All Rights Reserved.</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";

// Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyCHWMstWD8QwoT_kz2lBW8ZNXNlXerl-9c",
    authDomain: "xacanonblog.firebaseapp.com",
    projectId: "xacanonblog",
    storageBucket: "xacanonblog.firebasestorage.app",
    messagingSenderId: "319182532803",
    appId: "1:319182532803:web:3a4d33372643dd71d5f276",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const _auth = getAuth(app);

// ── MAINTENANCE CHECK ──────────────────────────────────────────
const _maintSnap = await getDoc(doc(db, "siteSettings", "maintenance"));
if (_maintSnap.exists() && _maintSnap.data().enabled === true) {
  const _ov = document.getElementById("maintenance-overlay");
  const _msg = _maintSnap.data().message;
  if (_ov) {
    if (_msg) { const _el = document.getElementById("maint-message-text"); if (_el) _el.textContent = _msg; }
    _ov.style.display = "flex";
    document.body.style.overflow = "hidden";
    onAuthStateChanged(_auth, (user) => {
      if (user) { _ov.style.display = "none"; document.body.style.overflow = "auto"; }
    });
  }
}

// ── GLOBAL NAV LOADER ──────────────────────────────────────────
const _navSnap = await getDoc(doc(db, "siteSettings", "globalMenu")).catch(() => null);
if (_navSnap && _navSnap.exists() && _navSnap.data().htmlCode) {
  const _navContainer = document.querySelector('.navbar-container');
  if (_navContainer) {
    const _logo = _navContainer.querySelector('.nav-logo');
    _navContainer.innerHTML = _navSnap.data().htmlCode;
    if (_logo && !_navContainer.querySelector('.nav-logo')) _navContainer.prepend(_logo);
    const _hb = _navContainer.querySelector('.hamburger');
    const _nl = _navContainer.querySelector('.nav-links');
    if (_hb && _nl) _hb.addEventListener('click', () => _nl.classList.toggle('active'));
  }
}

// Hamburger toggle
// Hamburger fallback (only binds if nav loader didn't already)
const _hbPost = document.querySelector('.hamburger');
const _nlPost = document.querySelector('.nav-links');
if (_hbPost && _nlPost && !_hbPost._bound) {
  _hbPost._bound = true;
  _hbPost.addEventListener('click', () => _nlPost.classList.toggle('active'));
}

// Get post ID from URL
const urlParams = new URLSearchParams(window.location.search);
const postId = urlParams.get('id');

async function loadPost() {
  if(!postId) { document.getElementById('postContainer').innerHTML="<p>Post not found.</p>"; return; }
  const docRef = doc(db, "blogPosts", postId);
  const docSnap = await getDoc(docRef);
  if(docSnap.exists()){
    const post = docSnap.data();
    const date = post.timestamp?.toDate ? post.timestamp.toDate() : new Date();
    document.getElementById('postContainer').innerHTML = `
      <h1>${post.title}</h1>
      <div class="meta">Tags: ${post.tags?.join(', ') || 'None'} | Published: ${date.toLocaleString()}</div>
      <div>${post.content}</div>
    `;
  } else {
    document.getElementById('postContainer').innerHTML="<p>Post not found.</p>";
  }
}

loadPost();
</script>
