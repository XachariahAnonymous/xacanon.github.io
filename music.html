<style>
body { margin:0; padding:0; font-family:'Friz Quadrata', serif; background:#0f0f0f; color:#f0f0f0; }

/* NAVBAR */
.navbar { position:sticky; top:0; z-index:1000; background:#0f0f0f; border-bottom:1px solid #ff4f81; box-shadow:0 0 10px #ff4f81; }
.navbar-container { display:flex; align-items:center; justify-content:space-between; padding:1rem 2rem; max-width:1200px; margin:0 auto; flex-wrap:wrap; }
.nav-logo img { height:50px; animation:pulseGlitch 2s infinite ease-in-out; }
@keyframes pulseGlitch {0%,100%{filter:none;}50%{filter:drop-shadow(0 0 6px #ff4f81); transform:scale(1.05);}}

.nav-right { display:flex; align-items:center; gap:1rem; position:relative; }
.home-button { color:#f0f0f0; text-decoration:none; font-size:1.1rem; padding:0.4rem 0.8rem; border:1px solid #ff4f81; border-radius:6px; transition: 0.3s; }
.home-button:hover { background: rgba(255, 79, 129, 0.1); }

.hamburger { font-size:1.8rem; cursor:pointer; color:#f0f0f0; }
.nav-links { list-style:none; flex-direction:column; position:absolute; top:120%; right:0; background:#0f0f0f; border:1px solid #ff4f81; border-radius:8px; padding:0.5rem 1rem; display:none; z-index: 1001; }
.nav-links.active { display:flex; }
.nav-links li a { color:#f0f0f0; text-decoration:none; display: block; padding: 0.5rem 0; }

/* Header */
header { text-align:center; padding:3rem 1rem 1rem; }
header h1 { font-size:2.8rem; letter-spacing:2px; text-transform:uppercase; color:#f0f0f0; }

/* PRESAVE BUTTON - STAYS CENTERED */
.featured-container { text-align: center; padding: 1.5rem 0 3rem; width: 100%; }
.presave-btn {
  display: inline-block;
  padding: 12px 30px;
  font-size: 1.1rem;
  color: #fff;
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 2px;
  border: 2px solid #ff4f81;
  background: rgba(255, 79, 129, 0.05);
  box-shadow: 0 0 10px rgba(255, 79, 129, 0.2);
  animation: btnPulse 2s infinite;
}
@keyframes btnPulse {
  0% { box-shadow: 0 0 0 0px rgba(255, 79, 129, 0.7); }
  70% { box-shadow: 0 0 0 15px rgba(255, 79, 129, 0); }
  100% { box-shadow: 0 0 0 0px rgba(255, 79, 129, 0); }
}

/* MUSIC SECTIONS - UPDATED TO FAR LEFT */
.music-section { 
  padding: 1rem 2rem; 
  max-width: 100%; 
  margin: 0; 
}

.collapsible { 
  position: relative; 
  cursor: pointer; 
  display: flex; 
  align-items: center; 
  gap: 0.8rem; 
  padding: 1rem 0; 
  border-bottom: 1px solid rgba(255, 79, 129, 0.2); 
  margin-bottom: 0.5rem; 
  transition: 0.3s;
  justify-content: flex-start;
}

.collapsible:hover { background: rgba(255, 79, 129, 0.05); }
.collapsible::before { content: "\f105"; font-family: "Font Awesome 5 Free"; font-weight: 900; color: #ff4f81; transition: 0.3s; }
.collapsible.active::before { transform: rotate(90deg); }

.music-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1.5rem; }
.music-card { background:#1a1a1a; border-radius:8px; padding:0.8rem; text-align:center; cursor:pointer; transition: 0.3s; border: 1px solid transparent; }
.music-card:hover { border-color: #ff4f81; transform: translateY(-3px); }
.music-card img { width:100%; border-radius:6px; margin-bottom:0.5rem; }
.music-card h3 { font-size: 0.9rem; margin: 0; color: #eee; }

.loader-text { font-size: 0.8rem; color: #ff4f81; text-transform: uppercase; animation: loaderPulse 1s infinite alternate; }
@keyframes loaderPulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }

/* Modal */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); justify-content:center; align-items:center; z-index:2000; }
.modal-content { background:#111; padding:1.5rem; border-radius:12px; max-width:500px; width:90%; position:relative; border: 1px solid #ff4f81; }
.modal-content iframe { width:100%; height:152px; border:none; border-radius: 8px; }
.modal-close { position:absolute; top:-45px; right:0; font-size:1.2rem; cursor:pointer; color:#ff4f81; text-transform: uppercase; letter-spacing: 1px; }

footer { padding:3rem 1rem; background:#111; border-top:1px solid #ff4f81; text-align:center; font-size:0.9rem; margin-top: 4rem; }
@media(max-width:768px){ .music-grid { grid-template-columns:repeat(2,1fr); } }
@media(max-width:480px){ .music-grid { grid-template-columns:repeat(1,1fr); } }
</style>
</head>

<header>

<div class="featured-container">

<section class="music-section">

  <div class="music-grid" id="singles-2026"></div>

  <h2 class="collapsible" data-section="albums-2025">2025 Albums</h2>

<script>
const data = {
  "singles-2026": ["https://open.spotify.com/track/4K0sC4yvqVhWAXZxSmQdOz?si=b3ef1ad616fa4fba"],
  "singles-2025": [
    "https://open.spotify.com/track/1cDklONzjw2qqYIzbMAOTc?si=bf802a93fdda4cab", "https://open.spotify.com/track/5OeuXkuoLdsqYpuHoqc350?si=b17c1562dfc84ec1", "https://open.spotify.com/track/6JeA3ahQtwqiTYpQhk73It?si=fd18ef3c01d14d1f",
    "https://open.spotify.com/track/7nXEbI0APAz5A0Eu5WplqT?si=8eb03ac33ea04af9", "https://open.spotify.com/track/1DhSKkbS2mJUiFydh4hIR5?si=559809734fc248f8", "https://open.spotify.com/track/0KMw00xCTfO2DknghdAm5e?si=dce2399513244913",
    "https://open.spotify.com/track/35SUMrkWFSstVfVj1yZDAU?si=8f7f8c7d2472455b", "https://open.spotify.com/track/65RXN2gyR6e5TAYEVojjOb?si=c4ecef8448714f44", "https://open.spotify.com/track/6Dk1WBTgXAcCtY9lGwMIw5?si=83e8507df9a847be"

    "https://open.spotify.com/track/3lTFMqTzBquDAUPT6xdZoJ?si=673faecfe5134015", "https://open.spotify.com/track/6VIOZte1t0272iYGHTiSQn?si=0d9d63aae60d4234", "https://open.spotify.com/track/6h28ylu9b46el9Ip2s8NjF?si=0861d815b66a439b"
  ],

  ]
};

document.querySelector('.hamburger').addEventListener('click', () => {
  document.querySelector('.nav-links').classList.toggle('active');
});

async function loadGrid(containerId, urls) {
  const container = document.getElementById(containerId);
  container.innerHTML = ""; 
  for (const url of urls) {
    const card = document.createElement("div");
    card.className = "music-card";
    card.innerHTML = `<div class="loader-text">Decrypting...</div>`;
    container.appendChild(card);
    
    fetch(`https://open.spotify.com/oembed?url=${encodeURIComponent(url)}`)
      .then(res => res.json())
      .then(d => {
        card.innerHTML = `<img src="${d.thumbnail_url}"><h3>${d.title}</h3>`;
      })
      .catch(() => {
        card.innerHTML = `<h3 style="color:#ff4f81;">Access Granted</h3>`;
      });
    
    card.addEventListener('click', () => openModal(url));
  }
}

document.querySelectorAll('.collapsible').forEach(header => {
  const content = header.nextElementSibling;
  content.style.display = "none";
  header.addEventListener('click', () => {
    const isActive = content.style.display === "grid";
    content.style.display = isActive ? "none" : "grid";
    header.classList.toggle("active", !isActive);
    if (!isActive && content.innerHTML === "") {
      const sectionKey = header.getAttribute('data-section');
      if (data[sectionKey]) loadGrid(sectionKey, data[sectionKey]);
    }
  });
});

function openModal(url) {
  let id = "";
  let type = "track";

  if (url.includes("/album/")) {
    type = "album";
    id = url.split("/album/")[1].split("?")[0];
  } else if (url.includes("/track/")) {
    type = "track";
    id = url.split("/track/")[1].split("?")[0];
  } else {
    id = url.split('/').pop().split('?')[0];
  }

  const player = document.getElementById("spotify-player");
  player.src = `https://open.spotify.com/embed/${type}/${id}`;
  document.getElementById("spotify-modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("spotify-modal").style.display="none"; 
  document.getElementById("spotify-player").src="";
}
document.querySelector(".modal-close").onclick = closeModal;
window.onclick = e => { if(e.target==document.getElementById("spotify-modal")) closeModal(); };
</script>
