    <style>
        :root {
            --wf-navy: #051C2C;
            --wf-red: #C30010;
            --wf-cyan: #99E6FF;
            --wf-white: #FFFFFF;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #0a2e47 0%, var(--wf-navy) 100%);
            color: var(--wf-white);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        .navbar {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; box-sizing: border-box; position: fixed; top: 0; z-index: 100;
        }

        .nav-btn {
            color: var(--wf-white); text-decoration: none; font-weight: 900;
            letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px; transition: 0.3s; background: rgba(5, 28, 44, 0.5);
            backdrop-filter: blur(5px); text-transform: uppercase; font-size: 0.8rem;
        }

        /* --- Hamburger Menu --- */
        .menu-wrap { position: fixed; top: 20px; right: 40px; z-index: 200; }
        .menu-wrap .toggler { position: absolute; top: 0; right: 0; z-index: 202; cursor: pointer; width: 50px; height: 50px; opacity: 0; }
        .menu-wrap .hamburger { width: 50px; height: 50px; padding: 10px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 201; }
        .menu-wrap .hamburger > div { position: relative; width: 100%; height: 3px; background: var(--wf-cyan); transition: all 0.4s ease; }
        .menu-wrap .hamburger > div::before, .menu-wrap .hamburger > div::after { content: ''; position: absolute; top: -10px; width: 100%; height: 3px; background: inherit; }
        .menu-wrap .hamburger > div::after { top: 10px; }
        .menu-wrap .toggler:checked + .hamburger > div { transform: rotate(135deg); background: var(--wf-red); }
        .menu-wrap .toggler:checked + .hamburger > div::before, .menu-wrap .toggler:checked + .hamburger > div::after { top: 0; transform: rotate(90deg); }
        .menu-wrap .menu { position: fixed; top: 0; right: 0; width: 100%; height: 100%; visibility: hidden; display: flex; align-items: center; justify-content: flex-end; z-index: 150; }
        .menu-wrap .menu > div { background: rgba(5, 28, 44, 0.98); border-left: 4px solid var(--wf-red); width: 300px; height: 100%; display: flex; align-items: center; justify-content: center; transform: translateX(100%); transition: all 0.4s ease; }
        .menu-wrap .toggler:checked ~ .menu { visibility: visible; }
        .menu-wrap .toggler:checked ~ .menu > div { transform: translateX(0); }
        .menu-wrap .menu ul { list-style: none; padding: 0; text-align: right; }
        .menu-wrap .menu ul li { padding: 1.2rem 2rem; }
        .menu-wrap .menu ul li a { color: var(--wf-white); text-decoration: none; font-size: 1.6rem; font-weight: 900; }

        /* --- LOGO SECTION --- */
        header { padding: 140px 20px 40px; text-align: center; }

        .logo-container {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            font-family: 'Archivo Black', sans-serif; font-size: 4rem;
            letter-spacing: -2px; text-transform: uppercase;
            filter: drop-shadow(0 0 10px rgba(153, 230, 255, 0.3));
        }

        .wf-logo-img {
            width: 120px; height: 120px;
            border-radius: 50%;
            object-fit: cover; /* Keeps image from stretching */
            filter: drop-shadow(0 0 15px rgba(195, 0, 16, 0.6));
            border: 2px solid rgba(255,255,255,0.1); /* Adds a subtle ring */
        }

        .text-why { color: var(--wf-white); }
        .text-files { color: var(--wf-cyan); }

        /* --- Server Card --- */
        .server-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(153, 230, 255, 0.15);
            padding: 40px; border-radius: 4px; backdrop-filter: blur(10px);
            text-align: center; max-width: 650px; width: 90%;
            margin-bottom: 60px;
        }

        .ip-box {
            background: #000; padding: 15px; border-radius: 4px;
            font-family: 'Courier New', monospace; color: var(--wf-cyan);
            font-size: 1.5rem; margin: 25px 0; border: 1px solid var(--wf-cyan);
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-weight: bold;
        }

        .ip-box:hover { background: var(--wf-cyan); color: var(--wf-navy); box-shadow: 0 0 25px var(--wf-cyan); }

        .btn { display: inline-block; padding: 15px 35px; background: var(--wf-red); color: white; text-decoration: none; border-radius: 2px; font-weight: bold; text-transform: uppercase; transition: 0.2s; letter-spacing: 1px; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--wf-red); }

        footer { margin-top: auto; padding: 40px; font-size: 0.8rem; opacity: 0.5; text-align: center; letter-spacing: 1px; }
    </style>
</head>

        <div class="ip-box" onclick="copyIP()">

        ANOTHER MYSTERY SOLVED... OR IS IT?
    </footer>

    <script>
        function copyIP() {
            const ip = "PLAY.THEWHYFILES.IO";
            navigator.clipboard.writeText(ip);
            const box = document.querySelector('.ip-box');
            const originalText = box.innerText;
            box.innerText = "COPIED TO CLIPBOARD";
            box.style.borderColor = "#FFFFFF";
            setTimeout(() => {
                box.innerText = originalText;
                box.style.borderColor = "var(--wf-cyan)";
            }, 2000);
        }
    </script>
