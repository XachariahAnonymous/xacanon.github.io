<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Terminal | Why Files</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        :root {
            --wf-navy: #051C2C;
            --wf-red: #C30010;
            --wf-cyan: #99E6FF;
            --wf-white: #FFFFFF;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #0a2e47 0%, var(--wf-navy) 100%);
            color: var(--wf-white);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- LOGO REPLICA NAVBAR --- */
        .navbar {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; position: fixed; top: 0; z-index: 1000;
            background: rgba(5, 28, 44, 0.9); backdrop-filter: blur(10px); box-sizing: border-box;
            border-bottom: 1px solid rgba(153, 230, 255, 0.1);
        }

        .logo-container {
            display: flex; align-items: center; gap: 10px;
            font-family: 'Archivo Black', sans-serif; font-size: 1.8rem;
            letter-spacing: -2px; text-transform: uppercase;
            transform: scaleX(0.9); text-decoration: none;
            filter: drop-shadow(0 0 8px rgba(153, 230, 255, 0.3));
        }

        .wf-circle {
            background-color: var(--wf-red); width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: white; transform: scaleX(1.11);
            box-shadow: 0 0 15px rgba(195, 0, 16, 0.4);
        }

        /* --- UNIVERSAL SIDEBAR --- */
        .side-menu {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100vh;
            background: var(--wf-navy); border-right: 3px solid var(--wf-red);
            z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 70px 20px 20px; box-sizing: border-box;
            box-shadow: 25px 0 50px rgba(0,0,0,0.8);
        }

        .side-menu.open { left: 0; }

        .close-x {
            position: absolute; top: 20px; right: 25px;
            font-size: 2rem; color: var(--wf-red);
            cursor: pointer; font-weight: 900; transition: 0.2s;
            line-height: 1;
        }
        .close-x:hover { color: var(--wf-white); transform: rotate(90deg); }

        .menu-title {
            font-family: 'Archivo Black', sans-serif; color: var(--wf-cyan);
            font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 25px; border-bottom: 1px solid rgba(153, 230, 255, 0.2);
            padding-bottom: 10px;
        }

        .menu-opt {
            display: block; color: white; text-decoration: none; padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 900;
            text-transform: uppercase; cursor: pointer; transition: 0.2s; font-size: 0.8rem;
        }

        .menu-opt:hover { color: var(--wf-cyan); background: rgba(153, 230, 255, 0.1); padding-left: 25px; }

        /* --- INTERFACE --- */
        .terminal-container { margin-top: 120px; width: 90%; max-width: 1100px; text-align: center; }

        .main-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }

        .tab-btn {
            background: transparent; border: 1px solid rgba(153, 230, 255, 0.3);
            color: white; padding: 12px 30px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }

        .tab-btn.active { background: var(--wf-red); border-color: var(--wf-red); box-shadow: 0 0 15px var(--wf-red); }

        .nav-trigger {
            display: inline-flex; align-items: center; gap: 12px;
            background: rgba(153, 230, 255, 0.05); border: 1px solid var(--wf-cyan);
            color: var(--wf-cyan); padding: 12px 30px; cursor: pointer;
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 30px; transition: 0.3s; font-size: 0.85rem;
        }

        .nav-trigger:hover { background: var(--wf-cyan); color: var(--wf-navy); box-shadow: 0 0 20px var(--wf-cyan); }

        /* --- CONTENT DISPLAY --- */
        .menu-content { display: none; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; text-align: left; }
        .menu-content.active { display: grid; }

        .questline-group { display: none; grid-column: 1 / -1; width: 100%; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .questline-group.active { display: grid; }

        .item-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(153, 230, 255, 0.1);
            padding: 25px; transition: 0.3s; border-radius: 4px;
        }
        .item-card:hover { border-color: var(--wf-cyan); background: rgba(153, 230, 255, 0.05); transform: translateY(-5px); }

        .tag { font-size: 0.65rem; font-weight: 900; padding: 4px 10px; margin-bottom: 12px; display: inline-block; text-transform: uppercase; }
        .tag-free { background: #28a745; color: white; }
        .tag-paid { background: var(--wf-red); color: white; }
        .tag-quest { background: #ffc107; color: black; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo-container">
            <div class="wf-circle">WF?</div>
            <div style="color: white;">WHY<span style="color: var(--wf-cyan);">FILES</span></div>
        </a>
        <a href="index.html" style="color: white; text-decoration: none; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px;">EXIT_SESSION</a>
    </nav>

    <div id="side-menu" class="side-menu">
        <div class="close-x" onclick="closeMenu()">×</div>
        <div id="menu-options-container"></div>
    </div>

    <div class="terminal-container">
        <div class="main-tabs">
            <button class="tab-btn active" onclick="switchTab('quests', this)">Quests</button>
            <button class="tab-btn" onclick="switchTab('pets', this)">Pets</button>
        </div>

        <div id="menu-trigger" class="nav-trigger" onclick="toggleMenu()">
            ☰ OPEN MISSION INDEX
        </div>

        <div id="quests" class="menu-content active">
            <div id="ql-1" class="questline-group active">
                <div class="item-card">
                    <div class="tag tag-quest">TEST-01</div>
                    <h3 style="margin: 0; color: var(--wf-cyan);">Research Briefing</h3>
                    <p style="font-size: 0.85rem; opacity: 0.7;">Initial data gathering mission.</p>
                </div>
            </div>
            <div id="ql-2" class="questline-group">
                <div class="item-card">
                    <div class="tag tag-quest">TEST-02</div>
                    <h3 style="margin: 0; color: var(--wf-cyan);">Infiltration</h3>
                    <p style="font-size: 0.85rem; opacity: 0.7;">Analyzing breached data nodes.</p>
                </div>
            </div>
        </div>

        <div id="pets" class="menu-content">
            <div class="item-card" data-category="join">
                <div class="tag tag-free">Quest Reward</div>
                <h3 style="margin: 0;">Foil Hat Hecklefish</h3>
                <p style="font-size: 0.85rem; opacity: 0.7;">Get all free to play items</p>
            </div>
            <div class="item-card" data-category="quest">
                <div class="tag tag-quest">Exclusive</div>
                <h3 style="margin: 0;">Hecklefish with 100 flag</h3>
                <p style="font-size: 0.85rem; opacity: 0.7;">Earned by log-in priority.</p>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'quests';

        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            menu.classList.toggle('open');
        }

        function openMenu() { document.getElementById('side-menu').classList.add('open'); }
        function closeMenu() { document.getElementById('side-menu').classList.remove('open'); }

        function switchTab(tabId, btn) {
            // Toggle menu closed if user clicks tabs while menu is open
            closeMenu();

            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            document.querySelectorAll('.menu-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            const trigger = document.getElementById('menu-trigger');
            trigger.innerText = (tabId === 'quests') ? '☰ OPEN MISSION INDEX' : '☰ FILTER RESEARCH SPECIMENS';
            
            updateSidebarContent();
        }

        function updateSidebarContent() {
            const container = document.getElementById('menu-options-container');
            if (currentTab === 'quests') {
                container.innerHTML = `
                    <div class="menu-title">Select Mission Log</div>
                    <div class="menu-opt" onclick="swapQuestline('ql-1')">Test Questline 1</div>
                    <div class="menu-opt" onclick="swapQuestline('ql-2')">Test Questline 2</div>
                `;
            } else {
                container.innerHTML = `
                    <div class="menu-title">Filter Specimens</div>
                    <div class="menu-opt" onclick="filterPets('all')">Show All</div>
                    <div class="menu-opt" onclick="filterPets('free')">Free Pets</div>
                    <div class="menu-opt" onclick="filterPets('paid')">Premium Pets</div>
                    <div class="menu-opt" onclick="filterPets('quest')">Quest Rewards</div>
                    <div class="menu-opt" onclick="filterPets('exclusive')">Exclusive Pets</div>
                    <div class="menu-opt" onclick="filterPets('join')">New Arrival Pets</div>
                `;
            }
        }

        function swapQuestline(qlId) {
            document.querySelectorAll('.questline-group').forEach(group => group.classList.remove('active'));
            document.getElementById(qlId).classList.add('active');
            closeMenu();
        }

        function filterPets(category) {
            const cards = document.querySelectorAll('#pets .item-card');
            cards.forEach(card => {
                const itemCat = card.getAttribute('data-category');
                card.style.display = (category === 'all' || itemCat === category) ? 'block' : 'none';
            });
            closeMenu();
        }

        updateSidebarContent();
    </script>
</body>
</html>
