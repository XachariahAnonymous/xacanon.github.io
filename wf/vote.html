<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote | Why Files Research Division</title>
    <style>
        :root {
            --wf-navy: #051C2C;
            --wf-red: #C30010;
            --wf-cyan: #99E6FF;
            --wf-white: #FFFFFF;
            --wf-dark-bg: #030f18;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #0a2e47 0%, var(--wf-navy) 100%);
            color: var(--wf-white);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        .navbar { width: 100%; display: flex; justify-content: space-between; padding: 20px 40px; position: fixed; top: 0; z-index: 100; box-sizing: border-box; }
        .nav-btn { color: var(--wf-white); text-decoration: none; font-weight: 900; letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.2); padding: 8px 20px; transition: 0.3s; background: rgba(5, 28, 44, 0.5); backdrop-filter: blur(5px); font-size: 0.9rem; }
        .nav-btn:hover { background: var(--wf-white); color: var(--wf-navy); box-shadow: 0 0 15px var(--wf-white); }

        /* --- Hamburger Menu --- */
        .menu-wrap { position: fixed; top: 20px; right: 40px; z-index: 200; }
        .menu-wrap .toggler { position: absolute; top: 0; right: 0; z-index: 202; cursor: pointer; width: 50px; height: 50px; opacity: 0; }
        .menu-wrap .hamburger { width: 50px; height: 50px; padding: 10px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 201; }
        .menu-wrap .hamburger > div { position: relative; width: 100%; height: 3px; background: var(--wf-cyan); transition: all 0.4s ease; }
        .menu-wrap .hamburger > div::before, .menu-wrap .hamburger > div::after { content: ''; position: absolute; top: -10px; width: 100%; height: 3px; background: inherit; }
        .menu-wrap .hamburger > div::after { top: 10px; }
        .menu-wrap .toggler:checked + .hamburger > div { transform: rotate(135deg); background: var(--wf-red); }
        .menu-wrap .toggler:checked + .hamburger > div::before, .menu-wrap .toggler:checked + .hamburger > div::after { top: 0; transform: rotate(90deg); }
        .menu-wrap .menu { position: fixed; top: 0; right: 0; width: 100%; height: 100%; visibility: hidden; display: flex; align-items: center; justify-content: flex-end; z-index: 150; }
        .menu-wrap .menu > div { background: rgba(5, 28, 44, 0.98); border-left: 4px solid var(--wf-red); width: 300px; height: 100%; display: flex; align-items: center; justify-content: center; transform: translateX(100%); transition: all 0.4s ease; }
        .menu-wrap .toggler:checked ~ .menu { visibility: visible; }
        .menu-wrap .toggler:checked ~ .menu > div { transform: translateX(0); }
        .menu-wrap .menu ul { list-style: none; padding: 0; text-align: right; }
        .menu-wrap .menu ul li { padding: 1.2rem 2rem; }
        .menu-wrap .menu ul li a { color: var(--wf-white); text-decoration: none; font-size: 1.6rem; font-weight: 900; }

        /* --- Vote Content --- */
        .container { padding: 160px 20px 60px; max-width: 800px; width: 100%; text-align: center; position: relative; }
        
        /* Hecklefish Intercept */
        #hecklefish-tip {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--wf-red);
            color: white;
            padding: 15px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            max-width: 250px;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
            border: 2px solid white;
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .vote-list { display: grid; gap: 15px; }

        .vote-link {
            background: var(--wf-dark-bg);
            border: 1px solid rgba(153, 230, 255, 0.2);
            color: var(--wf-white);
            text-decoration: none;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
        }

        .vote-link::after {
            content: "TRANSMIT";
            position: absolute;
            right: -120px;
            background: var(--wf-cyan);
            color: var(--wf-navy);
            padding: 8px 25px;
            font-size: 0.8rem;
            transition: 0.3s;
            font-weight: 900;
        }

        .vote-link:hover {
            border-color: var(--wf-cyan);
            box-shadow: 0 0 25px rgba(153, 230, 255, 0.15);
            padding-right: 140px;
        }

        .vote-link:hover::after { right: 0; }

        .status-badge {
            font-size: 0.75rem;
            color: var(--wf-cyan);
            border: 1px solid var(--wf-cyan);
            padding: 3px 12px;
            letter-spacing: 1px;
        }

        footer { margin-top: auto; padding: 40px; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-btn">HOME</a>
    </nav>

    <div class="menu-wrap">
        <input type="checkbox" class="toggler">
        <div class="hamburger"><div></div></div>
        <div class="menu">
            <div>
                <ul>
                    <li><a href="store.html">STORE</a></li>
                    <li><a href="vote.html">VOTE</a></li>
                    <li><a href="forum.html">FORUM</a></li>
                    <li><a href="rules.html">RULES</a></li>
                    <li><a href="staff.html">STAFF LIST</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div id="hecklefish-tip">
        <span style="display:block; font-size: 0.6rem; opacity: 0.8; margin-bottom: 5px;">[ENCRYPTED INTERCEPT]</span>
        <span id="tip-text">LIZZID PEEPLE!</span>
    </div>

    <div class="container">
        <div class="vote-list">
            <a href="#" class="vote-link" onmouseover="showTip()" onmouseout="hideTip()">
                <span>SIGNAL SITE ALPHA</span>
                <span class="status-badge">READY</span>
            </a>
            <a href="#" class="vote-link" onmouseover="showTip()" onmouseout="hideTip()">
                <span>SIGNAL SITE BETA</span>
                <span class="status-badge">READY</span>
            </a>
            <a href="#" class="vote-link" onmouseover="showTip()" onmouseout="hideTip()">
                <span>SIGNAL SITE GAMMA</span>
                <span class="status-badge">READY</span>
            </a>
            <a href="#" class="vote-link" onmouseover="showTip()" onmouseout="hideTip()">
                <span>SIGNAL SITE DELTA</span>
                <span class="status-badge">READY</span>
            </a>
        </div>

        <p style="margin-top: 40px; font-size: 0.8rem; opacity: 0.6; font-style: italic; letter-spacing: 1px;">
            *Signal resets every 24 hours. Check your coordinates daily.
        </p>
    </div>

    <footer>Another mystery solved... or is it?</footer>

    <script>
        const quotes = [
            "LIZZID PEEPLE!",
            "I don't trust the moon. It follows me.",
            "GET YOUR TINFOIL HATS READY!",
            "Mount Hayes! It's always Mount Hayes!",
            "Don't click that! They're watching!",
            "Check the numbers, AJ!",
            "Is that a camel? I hate camels.",
            "THE TRUTH IS HIDDEN IN THE DATA!",
            "One vote for me, zero for the lizzids!"
        ];

        const tip = document.getElementById('hecklefish-tip');
        const text = document.getElementById('tip-text');

        function showTip() {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            text.innerText = randomQuote;
            tip.style.display = 'block';
        }

        function hideTip() {
            tip.style.display = 'none';
        }
    </script>

</body>
</html>
