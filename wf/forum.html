<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive | Why Files Research Division</title>
    <style>
        :root {
            --wf-navy: #051C2C;
            --wf-red: #C30010;
            --wf-cyan: #99E6FF;
            --wf-white: #FFFFFF;
            --wf-gray: #1a3a4f;
            --wf-dark: #030f18;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #0a2e47 0%, var(--wf-navy) 100%);
            color: var(--wf-white);
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- Navigation --- */
        .navbar { width: 100%; display: flex; justify-content: space-between; padding: 20px 40px; position: fixed; top: 0; z-index: 100; box-sizing: border-box; background: rgba(5, 28, 44, 0.8); backdrop-filter: blur(10px); }
        .nav-btn { color: var(--wf-white); text-decoration: none; font-weight: 900; letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.2); padding: 8px 20px; transition: 0.3s; font-size: 0.9rem; }
        .nav-btn:hover { background: var(--wf-white); color: var(--wf-navy); box-shadow: 0 0 15px var(--wf-white); }

        /* --- Layout --- */
        .forum-wrapper { display: flex; max-width: 1200px; width: 100%; margin: 100px auto 40px; gap: 30px; padding: 0 20px; box-sizing: border-box; }

        /* --- Sidebar Menu --- */
        .sidebar { width: 250px; flex-shrink: 0; }
        .sidebar-title { font-size: 0.7rem; letter-spacing: 3px; color: var(--wf-red); font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid var(--wf-red); padding-bottom: 5px; }
        .sector-list { list-style: none; padding: 0; margin: 0; }
        .sector-item { 
            padding: 12px 15px; background: rgba(255,255,255,0.05); margin-bottom: 8px; 
            cursor: pointer; border: 1px solid transparent; transition: 0.3s;
            font-weight: bold; font-size: 0.9rem; letter-spacing: 1px;
        }
        .sector-item:hover { background: rgba(153, 230, 255, 0.1); border-color: var(--wf-cyan); color: var(--wf-cyan); }
        .sector-item.active { background: var(--wf-cyan); color: var(--wf-navy); border-color: var(--wf-cyan); box-shadow: 0 0 15px var(--wf-cyan); }

        /* --- Main Archive Area --- */
        .main-archive { flex-grow: 1; }
        
        .admin-status { display: none; background: var(--wf-red); color: white; text-align: center; padding: 5px; font-size: 0.8rem; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; }

        .post-creator { background: var(--wf-dark); border: 1px solid var(--wf-cyan); padding: 20px; border-radius: 4px; margin-bottom: 30px; }
        .post-creator input, .post-creator select, .post-creator textarea {
            width: 100%; background: #000; border: 1px solid #333; color: var(--wf-cyan); padding: 10px; margin-bottom: 10px; box-sizing: border-box; font-family: 'Courier New', monospace;
        }
        .submit-btn { background: var(--wf-red); color: white; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.3s; }
        .submit-btn:hover { box-shadow: 0 0 15px var(--wf-red); }

        /* --- Post Cards --- */
        .post-card { background: var(--wf-gray); border-left: 4px solid var(--wf-cyan); padding: 20px; position: relative; margin-bottom: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .post-header { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--wf-cyan); margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        .post-content { line-height: 1.6; font-size: 0.95rem; }
        .delete-btn { display: none; position: absolute; top: 10px; right: 10px; background: var(--wf-red); color: white; border: none; padding: 5px 10px; font-size: 0.6rem; cursor: pointer; }

        footer { margin-top: auto; padding: 40px; font-size: 0.8rem; opacity: 0.5; text-align: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-btn">HOME</a>
        <div style="font-weight: 900; letter-spacing: 2px;">ARCHIVE <span style="color: var(--wf-cyan);">BETA</span></div>
    </nav>

    <div class="forum-wrapper">
        <aside class="sidebar">
            <div class="sidebar-title">RESEARCH SECTORS</div>
            <ul class="sector-list">
                <li class="sector-item active" onclick="filterSector('ALL')">ALL FILES</li>
                <li class="sector-item" onclick="filterSector('GENERAL')">GENERAL INTEL</li>
                <li class="sector-item" onclick="filterSector('THEORIES')">THEORY ROOM</li>
                <li class="sector-item" onclick="filterSector('BUGS')">GLITCH REPORTS</li>
                <li class="sector-item" onclick="filterSector('MARKET')">TRADING HUB</li>
            </ul>
        </aside>

        <main class="main-archive">
            <div id="adminBadge" class="admin-status">[ADMIN OVERRIDE ENABLED]</div>
            
            <div class="post-creator">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="userName" placeholder="AGENT NAME" style="flex: 2;">
                    <select id="postSector" style="flex: 1;">
                        <option value="GENERAL">GENERAL INTEL</option>
                        <option value="THEORIES">THEORY ROOM</option>
                        <option value="BUGS">GLITCH REPORTS</option>
                        <option value="MARKET">TRADING HUB</option>
                    </select>
                </div>
                <textarea id="postText" rows="3" placeholder="INPUT NEW INTELLIGENCE..."></textarea>
                <button class="submit-btn" onclick="addPost()">UPLOAD FILE</button>
            </div>

            <div id="forumFeed"></div>
        </main>
    </div>

    <footer>Another mystery solved... or is it?</footer>

    <script>
        let posts = JSON.parse(localStorage.getItem('wf_posts')) || [];
        let currentSector = 'ALL';
        let adminMode = false;

        function renderPosts() {
            const feed = document.getElementById('forumFeed');
            feed.innerHTML = '';
            
            const filtered = currentSector === 'ALL' ? posts : posts.filter(p => p.sector === currentSector);

            filtered.slice().reverse().forEach((post) => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <span>AGENT: ${post.user}</span>
                        <span>SECTOR: ${post.sector}</span>
                        <span>DATE: ${post.date}</span>
                    </div>
                    <div class="post-content">${post.content}</div>
                    <button class="delete-btn" onclick="deletePost('${post.id}')">TERMINATE</button>
                `;
                feed.appendChild(card);
            });
            updateAdminUI();
        }

        function addPost() {
            const user = document.getElementById('userName').value || 'Anonymous';
            const sector = document.getElementById('postSector').value;
            const content = document.getElementById('postText').value;
            
            if(!content) return;

            const newPost = {
                id: Date.now().toString(),
                user: user.toUpperCase(),
                sector: sector,
                content: content,
                date: new Date().toLocaleDateString()
            };

            posts.push(newPost);
            localStorage.setItem('wf_posts', JSON.stringify(posts));
            document.getElementById('postText').value = '';
            renderPosts();
        }

        function deletePost(id) {
            posts = posts.filter(p => p.id !== id);
            localStorage.setItem('wf_posts', JSON.stringify(posts));
            renderPosts();
        }

        function filterSector(sector) {
            currentSector = sector;
            document.querySelectorAll('.sector-item').forEach(el => {
                el.classList.remove('active');
                if(el.innerText === (sector === 'ALL' ? 'ALL FILES' : sector.replace('_', ' '))) el.classList.add('active');
            });
            // Update active state visually
            const items = document.querySelectorAll('.sector-item');
            items.forEach(item => {
                if(item.innerText.includes(sector) || (sector === 'ALL' && item.innerText === 'ALL FILES')) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            renderPosts();
        }

        // --- ADMIN TOGGLE (Shift + A + L) ---
        let keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (keys['Shift'] && keys['A'] && keys['L']) {
                adminMode = !adminMode;
                document.getElementById('adminBadge').style.display = adminMode ? 'block' : 'none';
                updateAdminUI();
            }
        });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        function updateAdminUI() {
            document.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = adminMode ? 'block' : 'none');
        }

        renderPosts();
    </script>
</body>
</html>
